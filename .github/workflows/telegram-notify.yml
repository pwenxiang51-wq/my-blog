name: Telegram Notification

on:
  push:
    branches:
      - main  # 如果你的分支是 master，记得这里改成 master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_USER_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            🚀 博客更新通知
            
            提交者: ${{ github.actor }}
            提交内容: ${{ github.event.head_commit.message }}
            
            Cloudflare 正在后台构建中，请稍后访问...
            仓库地址: https://github.com/${{ github.repository }}
