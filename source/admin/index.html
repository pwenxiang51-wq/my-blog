<script>
  function initCMS() {
    // 检查 CMS 插件是否加载完成
    if (window.CMS) {
      console.log("CMS 已经就绪，开始初始化...");
      document.getElementById('loading').style.display = 'none';
      document.getElementById('root').style.display = 'block';

      window.CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "pwenxiang51-wq/my-blog",
            branch: "master",
            base_url: "https://blog.222382.xyz",
            auth_endpoint: "api/auth"
          },
          load_config_file: false,
          media_folder: "source/images",
          public_folder: "/images",
          collections: [
            {
              name: "blog",
              label: "文章列表",
              folder: "source/_posts",
              create: true,
              extension: "md",
              format: "frontmatter",
              fields: [
                { label: "标题", name: "title", widget: "string" },
                { label: "日期", name: "date", widget: "datetime" },
                { label: "正文", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    } else {
      // 如果还没加载完，等 200 毫秒再试，这就是 Grok 的稳健逻辑
      console.log("正在等待 CMS 加载...");
      setTimeout(initCMS, 200);
    }
  }
  
  // 启动检查
  initCMS();
</script>
