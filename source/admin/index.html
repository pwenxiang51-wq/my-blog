layout: false
---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin Dashboard</title>
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
</head>
<body>
  <div id="nc-root" style="text-align:center; margin-top:100px;">
    <h2>正在连接后台...</h2>
    <p>如果长时间没反应，请检查 F12 控制台</p>
  </div>

  <script>
    var cmsConfig = {
      backend: {
        name: "github",
        repo: "pwenxiang51-wq/my-blog",
        branch: "master",
        base_url: "https://blog.222382.xyz",
        auth_endpoint: "api/auth"
      },
      load_config_file: false,
      media_folder: "source/images",
      public_folder: "/images",
      collections: [
        {
          name: "posts",
          label: "文章列表",
          folder: "source/_posts",
          create: true,
          fields: [
            { label: "标题", name: "title", widget: "string" },
            { label: "日期", name: "date", widget: "datetime" },
            { label: "正文", name: "body", widget: "markdown" }
          ]
        }
      ]
    };

    // 依然用这个循环检查，这是最稳的
    var checkCMS = setInterval(function() {
      if (window.CMS) {
        clearInterval(checkCMS);
        window.CMS.init({ config: cmsConfig });
      }
    }, 100);
  </script>
</body>
</html>
