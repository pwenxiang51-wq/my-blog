<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CMS Admin</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <div id="msg" style="text-align:center; margin-top:50px; font-family:sans-serif; color:#666;">
    正在启动写作后台...
  </div>

  <script>
    var cmsConfig = {
      backend: {
        name: "github",
        repo: "pwenxiang51-wq/my-blog",
        branch: "master",
        base_url: "https://blog.222382.xyz",
        auth_endpoint: "api/auth"
      },
      load_config_file: false,
      media_folder: "source/images",
      public_folder: "/images",
      collections: [
        {
          name: "posts",
          label: "文章列表",
          folder: "source/_posts",
          create: true,
          fields: [
            { label: "标题", name: "title", widget: "string" },
            { label: "日期", name: "date", widget: "datetime" },
            { label: "正文", name: "body", widget: "markdown" }
          ]
        }
      ]
    };

    // 终极保险：循环检查 CMS 是否加载完毕，防止报错
    var checkCMS = setInterval(function() {
      if (window.CMS) {
        clearInterval(checkCMS);
        document.getElementById('msg').style.display = 'none'; // 隐藏提示
        window.CMS.init({ config: cmsConfig });
        console.log("CMS 启动成功！");
      }
    }, 100); // 每 0.1 秒检查一次
  </script>
</body>
</html>
