<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>内容管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    // 注意这里：是 CMS.init，不是 DecapCMS
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "pwenxiang51-wq/my-blog",
          branch: "master",
          base_url: "https://blog-auth.wenxiang0100.workers.dev",
          auth_endpoint: "auth"
        },
        load_config_file: false,
        media_folder: "source/images",
        public_folder: "/images",
        collections: [
          {
            name: "blog",
            label: "我的文章",
            folder: "source/_posts",
            create: true,
            fields: [
              { label: "标题", name: "title", widget: "string" },
              { label: "日期", name: "date", widget: "datetime" },
              { label: "正文", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
