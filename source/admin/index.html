<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>管理后台-终极版</title>
  <style>
    body { margin: 0; background: #f4f7f6; }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; color: #666; }
  </style>
</head>
<body>
  <div id="loading">正在全力加载管理后台...</div>

  <script src="https://lib.baomitu.com/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://lib.baomitu.com/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://lib.baomitu.com/decap-cms/2.10.192/decap-cms.js"></script>

  <script>
    // 脚本一旦加载，立即执行，不再等待循环
    (function() {
      const initInterval = setInterval(() => {
        if (window.CMS) {
          clearInterval(initInterval);
          document.getElementById('loading').style.display = 'none';
          
          window.CMS.init({
            config: {
              backend: {
                name: "github",
                repo: "pwenxiang51-wq/my-blog",
                branch: "master",
                base_url: "https://blog.222382.xyz",
                auth_endpoint: "api/auth"
              },
              load_config_file: false,
              display_url: "https://blog.222382.xyz",
              collections: [
                {
                  name: "blog",
                  label: "文章管理",
                  folder: "source/_posts",
                  create: true,
                  extension: "md",
                  format: "frontmatter",
                  fields: [
                    { label: "标题", name: "title", widget: "string" },
                    { label: "日期", name: "date", widget: "datetime" },
                    { label: "正文", name: "body", widget: "markdown" }
                  ]
                }
              ]
            }
          });
        }
      }, 100);
    })();
  </script>
</body>
</html>
