---
layout: false
---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>博客后台管理</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/decap-cms-app@^3.0.0/dist/decap-cms-app.js"></script>
</head>
<body>
  <script>
    // 定义配置
    var cmsConfig = {
      backend: {
        name: "github",
        repo: "pwenxiang51-wq/my-blog",
        branch: "master",
        base_url: "https://blog.222382.xyz", // 你的域名
        auth_endpoint: "api/auth"           // Grok 帮你搞好的认证接口
      },
      load_config_file: false,              // 强制不读 config.yml
      media_folder: "source/images",
      public_folder: "/images",
      collections: [
        {
          name: "posts",
          label: "文章列表",
          folder: "source/_posts",
          create: true,
          extension: "md",
          format: "frontmatter",
          fields: [
            { label: "标题", name: "title", widget: "string" },
            { label: "日期", name: "date", widget: "datetime" },
            { label: "正文", name: "body", widget: "markdown" }
          ]
        }
      ]
    };

    // 初始化 CMS
    window.CMS.init({ config: cmsConfig });
  </script>
</body>
</html>
