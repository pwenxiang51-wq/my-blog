<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容管理后台</title>
  <style>
    body { margin: 0; height: 100vh; background: #f8f9fa; font-family: system-ui, sans-serif; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; color: #666; }
  </style>
</head>
<body>
  <div id="loading">加载中，请稍候...</div>
  <div id="root" style="display:none;"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/decap-cms-app@3.1.1/dist/decap-cms-app.js"></script>

  <script>
    function initCMS() {
      if (window.CMS) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('root').style.display = 'block';
        CMS.init();
      } else {
        setTimeout(initCMS, 200);
      }
    }
    initCMS();
  </script>
</body>
</html>
