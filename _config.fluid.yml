changyan:
  appid: ''
  appkey: ''
livere:
  uid: ''
remark42:
  host:
  site_id:
  max_shown_comments: 10
  locale: zh
  components: ['embed']
twikoo:
  envId:
  region: ap-shanghai
  path: window.location.pathname
cusdis:
  host:
  app_id:
  lang: zh-cn
giscus:
  repo: pwenxiang51-wq/my-blog
  repo_id: "R_kgDOQwI2eQ"
  category: Announcements
  category_id: "DIC_kwDOQwI2ec4COfFp"
  theme_light: light
  theme_dark: dark
