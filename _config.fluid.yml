#---------------------------
# Hexo Theme Fluid
# Author: Fluid-dev
# Github: https://github.com/fluid-dev/hexo-theme-fluid
#---------------------------

#---------------------------
# 全局设置
#---------------------------
favicon: /img/fluid.png
apple_touch_icon: /img/fluid.png
tab_title_separator: " - "
force_https: false

code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github gist"
      style_dark: "dark"

fun_features:
  typing:
    enable: true
    typeSpeed: 70
    cursorChar: "_"
    loop: false
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
  progressbar:
    enable: true
    height_px: 3
    color: "#29d"
    options: { showSpinner: false, trickleSpeed: 100 }

dark_mode:
  enable: true
  default: auto

color:
  body_bg_color: "#eee"
  body_bg_color_dark: "#181c27"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  navbar_text_color: "#fff"
  navbar_text_color_dark: "#d0d0d0"
  subtitle_color: "#fff"
  subtitle_color_dark: "#d0d0d0"
  text_color: "#3c4858"
  text_color_dark: "#c4c6c9"
  board_color: "#fff"
  board_color_dark: "#252d38"
  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6c9"
  post_heading_color: "#1a202c"
  post_heading_color_dark: "#c4c6c9"
  post_link_color: "#0366d6"
  post_link_color_dark: "#1589e9"
  link_hover_color: "#30a9de"
  link_hover_color_dark: "#30a9de"
  link_hover_bg_color: "#f8f9fa"
  link_hover_bg_color_dark: "#364151"
  line_color: "#eaecef"
  line_color_dark: "#435266"
  scrollbar_color: "#c4c6c9"
  scrollbar_color_dark: "#687582"
  button_bg_color: "transparent"
  button_bg_color_dark: "transparent"
  button_hover_bg_color: "#f2f3f5"
  button_hover_bg_color_dark: "#46647e"

font:
  font_size: 16px
  font_family:
  letter_spacing: 0.02em
  code_font_size: 85%

custom_js:
custom_css:

web_analytics:
  enable: false

canonical:
  enable: false

lazyload:
  enable: true
  loading_img: /img/loading.gif
  onlypost: false
  offset_factor: 2

iconfont: //at.alicdn.com/t/c/font_1736178_k526ubmyhba.css

#---------------------------
# 页头导航栏
#---------------------------
navbar:
  blog_title: "Velo.x"
  ground_glass:
    enable: false
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }

search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

banner:
  parallax: true
  width_height_ratio: 1.0

scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

scroll_top_arrow:
  enable: true

open_graph:
  enable: true
  twitter_card: summary_large_image

#---------------------------
# 页脚
#---------------------------
footer:
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="iconfont icon-love"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  '
  statistics:
    enable: false

#---------------------------
# 首页配置 (赛博朋克图 + 打字机)
#---------------------------
index:
  # 首页 Banner (贩卖机)
  banner_img: /images/banner.jpg
  banner_img_height: 100
  banner_img_mask: 0.3
  
  # 打字机 Slogan
  slogan:
    enable: true
    text: "欢迎来到 Velo.x 的极客空间 || 探索 VPS 与黑科技的无尽边界"
    api:
      enable: false
  
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true
  post_sticky:
    enable: true
    icon: "iconfont icon-top"

#---------------------------
# 文章详情页 (火箭图 + 评论区)
#---------------------------
post:
  # 文章 Banner (火箭)
  banner_img: /images/article.jpg
  banner_img_height: 70
  banner_img_mask: 0.3
  
  default_index_img:

  meta:
    author:
      enable: false
    date:
      enable: true
      format: "LL a"
    wordcount:
      enable: true
    min2read:
      enable: true
    views:
      enable: false

  # 评论区总开关
  comments:
    enable: true
    type: utterances

  updated:
    enable: false
  category_bar:
    enable: true
    specific: true
    placement: left
  toc:
    enable: true
    placement: right
    collapseDepth: 0

    custom:
    content_bottom: |
      <% if (page.github_url) { %>
      <div style="margin-top: 40px; padding: 20px; background: #f6f8fa; border-radius: 12px; border: 1px solid #d0d7de;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <h4 style="margin: 0 0 10px 0; color: #24292f;">💾 本文源码已开源</h4>
            <p style="margin: 0; font-size: 14px; color: #57606a;">如果你对本文的技术实现感兴趣，欢迎去 GitHub 查看源码。</p>
          </div>
          <div style="font-size: 30px;">⚡</div>
        </div>
        <div style="margin-top: 15px;">
          <a href="<%= page.github_url %>" target="_blank" style="display: inline-block; background: #2da44e; color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; margin-right: 10px;">⭐ 获取本项目源码</a>
          <a href="<%= page.github_url %>/discussions" target="_blank" style="display: inline-block; background: #ffffff; color: #24292f; border: 1px solid #d0d7de; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px;">💬 参与讨论</a>
        </div>
      </div>
      <% } %>
  copyright:
    enable: true
    license: 'BY'
  prev_next:
    enable: true
  image_caption:
    enable: true
  image_zoom:
    enable: true
  footnote:
    enable: true
    header: ''
  math:
    enable: false
  mermaid:
    enable: false

#---------------------------
# 其他页面背景 (统一用火箭图)
#---------------------------
archive:
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3

category:
  enable: true
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3
  order_by: "-length"
  post_limit: 10

tag:
  enable: true
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3
  tagcloud:
    min_font: 15
    max_font: 30
    start_color: "#BBBBEE"
    end_color: "#337ab7"

about:
  enable: true
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3
  avatar: /img/avatar.png
  name: "Velo.x"
  intro: "极客 / VPS / 探索者"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com", tip: "GitHub" }

page:
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3

page404:
  enable: true
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3
  redirect_delay: 5000

links:
  enable: true
  banner_img: /images/article.jpg
  banner_img_height: 60
  banner_mask_alpha: 0.3
  items: []
  comments:
    enable: true
    type: utterances

#---------------------------
# 评论插件配置 (GitHub 仓库)
#---------------------------
utterances:
  repo: pwenxiang51-wq/my-blog
  issue_term: pathname
  label: utterances
  theme: github-light
  theme_dark: github-dark

#---------------------------
# 静态资源
#---------------------------
static_prefix:
  internal_js: /js
  internal_css: /css
  internal_img: /img
  anchor: https://lib.baomitu.com/anchor-js/5.0.0/
  github_markdown: https://lib.baomitu.com/github-markdown-css/4.0.0/
  jquery: https://lib.baomitu.com/jquery/3.6.4/
  bootstrap: https://lib.baomitu.com/twitter-bootstrap/4.6.1/
  prismjs: https://lib.baomitu.com/prism/1.29.0/
  tocbot: https://lib.baomitu.com/tocbot/4.20.1/
  typed: https://lib.baomitu.com/typed.js/2.0.12/
  fancybox: https://lib.baomitu.com/fancybox/3.5.7/
  nprogress: https://lib.baomitu.com/nprogress/0.2.0/
  mathjax: https://lib.baomitu.com/mathjax/3.2.2/
  katex: https://lib.baomitu.com/KaTeX/0.16.2/
  busuanzi: https://busuanzi.ibruce.info/busuanzi/2.3/
  clipboard: https://lib.baomitu.com/clipboard.js/2.0.11/
  mermaid: https://lib.baomitu.com/mermaid/8.14.0/
  valine: https://lib.baomitu.com/valine/1.5.1/
  waline: https://registry.npmmirror.com/@waline/client/2.15.8/files/dist/
  gitalk: https://lib.baomitu.com/gitalk/1.8.0/
  disqusjs: https://lib.baomitu.com/disqusjs/1.3.0/
  twikoo: https://lib.baomitu.com/twikoo/1.6.8/
  discuss: https://lib.baomitu.com/discuss/1.2.1/
  hint: https://lib.baomitu.com/hint.css/2.7.0/
  moment: https://lib.baomitu.com/moment.js/2.29.4/
